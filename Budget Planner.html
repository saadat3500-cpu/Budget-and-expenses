document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

div style=\"position: relative; height: 13px; background: #ecebe4; border-radius: 7px;\">\n            <div style=\"position: absolute; top: 0; left: 0; height: 100%; border-radius: 7px; background: {{ tr.color }}; width: {{ tr.barWidth }}; transition: width .35s ease, background .2s;\"><\u002Fdiv>\n            <div style=\"position: absolute; top: -4px; bottom: -4px; width: 2px; background: #6b6760; left: {{ tr.markerLeft }}; border-radius: 2px;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align: right; font-variant-numeric: tabular-nums;\">\n            <span style=\"font-size: 16px; font-weight: 700;\">{{ tr.pctStr }}<\u002Fspan>\n            <span style=\"font-size: 13px; color: #8d887c;\"> vs {{ tr.targetStr }} · {{ tr.actualStr }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Donut + legend -->\n  <div style=\"display: flex; align-items: center; gap: 48px; margin-bottom: 12px;\">\n    <div style=\"position: relative; width: 240px; height: 240px; flex-shrink: 0;\">\n      <svg width=\"240\" height=\"240\" viewBox=\"0 0 240 240\">\n        <g transform=\"rotate(-90 120 120)\">\n          <circle cx=\"120\" cy=\"120\" r=\"92\" fill=\"none\" stroke=\"#f0eee6\" stroke-width=\"32\"><\u002Fcircle>\n          <sc-for list=\"{{ donutSegments }}\" as=\"seg\" hint-placeholder-count=\"8\">\n            <circle cx=\"120\" cy=\"120\" r=\"92\" fill=\"none\" stroke=\"{{ seg.color }}\" stroke-width=\"32\" stroke-dasharray=\"{{ seg.dash }}\" stroke-dashoffset=\"{{ seg.offset }}\" style=\"transition: stroke-dasharray .4s ease, stroke-dashoffset .4s ease;\"><\u002Fcircle>\n          <\u002Fsc-for>\n        <\u002Fg>\n      <\u002Fsvg>\n      <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;\">\n        <div style=\"font-size: 11px; letter-spacing: 1.4px; font-weight: 600; color: #a39d90; text-transform: uppercase;\">Income<\u002Fdiv>\n        <div style=\"font-size: 27px; font-weight: 700; letter-spacing: -0.8px; color: #2a2823; font-variant-numeric: tabular-nums;\">{{ incomeStr }}<\u002Fdiv>\n        <div style=\"font-size: 12px; color: #9a958a;\">{{ periodLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 7px 32px;\">\n      <sc-for list=\"{{ donutSegments }}\" as=\"seg\" hint-placeholder-count=\"8\">\n        <div style=\"display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid #f3f0e8;\">\n          <span style=\"width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; background: {{ seg.color }};\"><\u002Fspan>\n          <span style=\"font-size: 14px; color: #4a4840; flex: 1;\">{{ seg.name }}<\u002Fspan>\n          <span style=\"font-size: 12.5px; color: #a39d90; font-variant-numeric: tabular-nums;\">{{ seg.pct }}<\u002Fspan>\n          <span style=\"font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 76px; text-align: right;\">{{ seg.valueStr }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Budget detail -->\n  <div style=\"font-size: 12px; letter-spacing: 1.6px; font-weight: 600; color: #9a958a; text-transform: uppercase; margin: 40px 0 14px;\">Budget detail<\u002Fdiv>\n\n  <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n    <sc-for list=\"{{ sections }}\" as=\"sec\" hint-placeholder-count=\"9\">\n      <div style=\"border: 1px solid #eeeae0; border-radius: 14px; overflow: hidden;\">\n        <div style=\"display: flex; align-items: center; gap: 11px; padding: 13px 20px; background: #f8f6f0; border-bottom: 1px solid #eeeae0;\">\n          <span style=\"width: 13px; height: 13px; border-radius: 3px; background: {{ sec.color }};\"><\u002Fspan>\n          <span style=\"font-size: 16px; font-weight: 700; flex: 1;\">{{ sec.name }}<\u002Fspan>\n          <span style=\"font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; color: {{ sec.totalColor }};\">{{ sec.subtotalStr }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding: 4px 20px 8px;\">\n          <sc-for list=\"{{ sec.items }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <div style=\"display: grid; grid-template-columns: 1fr 108px 132px 116px; align-items: center; gap: 16px; padding: 9px 0; border-bottom: 1px solid #f4f1ea;\">\n              <span style=\"font-size: 15px; color: #3a3833;\">{{ item.name }}<\u002Fspan>\n              <span style=\"display: flex; align-items: baseline; gap: 2px; font-size: 15px; font-weight: 600; color: #2a2823;\">$<input type=\"number\" value=\"{{ item.amount }}\" onchange=\"{{ item.onAmount }}\" style=\"font: inherit; color: inherit; background: transparent; border: none; outline: none; appearance: textfield; border-bottom: 1.5px dashed rgba(0,0,0,.22); width: 100%; padding: 1px 2px 2px; font-variant-numeric: tabular-nums;\" style-focus=\"background: rgba(0,0,0,.04); border-bottom-color: rgba(0,0,0,.5);\"><\u002Fspan>\n              <select class=\"bp-freq\" value=\"{{ item.freq }}\" onchange=\"{{ item.onFreq }}\" style=\"font-family: inherit; font-size: 13.5px; color: #6f6b62; background-color: #f6f4ed; border: 1px solid #e8e3d8; border-radius: 8px; padding: 6px 26px 6px 11px; cursor: pointer; outline: none; width: 100%;\">\n                <option value=\"Weekly\">Weekly<\u002Foption>\n                <option value=\"Fortnightly\">Fortnightly<\u002Foption>\n                <option value=\"Monthly\">Monthly<\u002Foption>\n                <option value=\"Quarterly\">Quarterly<\u002Foption>\n                <option value=\"Annually\">Annually<\u002Foption>\n              <\u002Fselect>\n              <span style=\"text-align: right; font-size: 15px; color: #87837a; font-variant-numeric: tabular-nums;\">{{ item.convertedStr }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    view: 'Monthly',\n    sections: [\n      { id: 'income', name: 'Income', color: '#2f8a4e', kind: 'income', items: [\n        { name: 'Take-home pay', amount: 10700, freq: 'Monthly' },\n        { name: 'Mobile allowance', amount: 150, freq: 'Monthly' },\n        { name: 'Bonuses / overtime', amount: 0, freq: 'Annually' },\n        { name: 'Investment income', amount: 0, freq: 'Annually' },\n      ]},\n      { id: 'home', name: 'Home & utilities', color: '#d6493a', kind: 'expense', items: [\n        { name: 'Rent (Gold Coast)', amount: 1050, freq: 'Weekly' },\n        { name: 'Electricity', amount: 180, freq: 'Monthly' },\n        { name: 'Gas', amount: 50, freq: 'Monthly' },\n        { name: 'Water', amount: 150, freq: 'Quarterly' },\n        { name: 'Internet', amount: 87, freq: 'Monthly' },\n        { name: 'Amazon Prime', amount: 79, freq: 'Annually' },\n        { name: 'Mobile plan 1', amount: 45, freq: 'Monthly' },\n        { name: 'Mobile plan 2', amount: 45, freq: 'Monthly' },\n        { name: 'Mobile plan 3', amount: 45, freq: 'Monthly' },\n      ]},\n      { id: 'groceries', name: 'Groceries & food', color: '#ef9f1f', kind: 'expense', items: [\n        { name: 'Groceries & meat', amount: 2140, freq: 'Monthly' },\n      ]},\n      { id: 'transport', name: 'Transport & auto', color: '#2f7fd6', kind: 'expense', items: [\n        { name: 'Public transport (commute)', amount: 50, freq: 'Weekly' },\n        { name: 'Public transport (other)', amount: 10, freq: 'Weekly' },\n        { name: 'Fuel', amount: 0, freq: 'Weekly' },\n        { name: 'Rego & licence', amount: 0, freq: 'Annually' },\n      ]},\n      { id: 'children', name: 'Children', color: '#7a6ad6', kind: 'expense', items: [\n        { name: 'Timezone', amount: 50, freq: 'Monthly' },\n        { name: 'Allowance', amount: 70, freq: 'Weekly' },\n      ]},\n      { id: 'memberships', name: 'Memberships', color: '#1f9d6b', kind: 'expense', items: [\n        { name: 'Engineers Australia', amount: 680, freq: 'Annually' },\n        { name: '500px', amount: 70, freq: 'Annually' },\n        { name: 'Adobe', amount: 24, freq: 'Monthly' },\n        { name: '1Password', amount: 60, freq: 'Annually' },\n        { name: 'Other apps', amount: 100, freq: 'Annually' },\n        { name: 'PMI', amount: 350, freq: 'Annually' },\n        { name: 'O365 Family', amount: 145, freq: 'Annually' },\n      ]},\n      { id: 'entertainment', name: 'Entertainment & eating-out', color: '#e0617f', kind: 'expense', items: [\n        { name: 'Eating out / drinks', amount: 0, freq: 'Weekly' },\n        { name: 'Holidays & travel', amount: 0, freq: 'Quarterly' },\n      ]},\n      { id: 'insurance', name: 'Insurance & financial', color: '#3aa6a0', kind: 'expense', items: [\n        { name: 'Health insurance', amount: 0, freq: 'Monthly' },\n        { name: 'Savings transfer', amount: 0, freq: 'Monthly' },\n        { name: 'Investments / super', amount: 0, freq: 'Monthly' },\n      ]},\n      { id: 'personal', name: 'Personal & medical', color: '#c98b3a', kind: 'expense', items: [\n        { name: 'Personal care', amount: 0, freq: 'Monthly' },\n        { name: 'Medical / dental', amount: 0, freq: 'Monthly' },\n      ]},\n    ],\n  };\n\n  updateAmount(si, ii, val) {\n    this.setState((st) => ({\n      sections: st.sections.map((sec, i) => i !== si ? sec : {\n        ...sec, items: sec.items.map((it, j) => j !== ii ? it : { ...it, amount: val }),\n      }),\n    }));\n  }\n  updateFreq(si, ii, val) {\n    this.setState((st) => ({\n      sections: st.sections.map((sec, i) => i !== si ? sec : {\n        ...sec, items: sec.items.map((it, j) => j !== ii ? it : { ...it, freq: val }),\n      }),\n    }));\n  }\n  setView(v) { this.setState({ view: v }); }\n\n  renderVals() {\n    const FREQ = { Weekly: 52, Fortnightly: 26, Monthly: 12, Quarterly: 4, Annually: 1 };\n    const SUFFIX = { Weekly: '/wk', Fortnightly: '/fn', Monthly: '/mo', Quarterly: '/qtr', Annually: '/yr' };\n    const LABELS = { Weekly: 'per week', Fortnightly: 'per fortnight', Monthly: 'per month', Quarterly: 'per quarter', Annually: 'per year' };\n    const s = this.state;\n    const viewPer = FREQ[s.view];\n    const suffix = SUFFIX[s.view];\n\n    const fmt = (n) => '$' + Math.round(n).toLocaleString('en-US');\n    const toMonthly = (amt, freq) => amt * FREQ[freq] / 12;\n    const toView = (m) => m * 12 / viewPer;\n    const vfmt = (m) => fmt(toView(m));\n\n    let incomeM = 0, expenseM = 0, groceryM = 0;\n    const sectionsVM = s.sections.map((sec, si) => {\n      let subtotalM = 0;\n      const items = sec.items.map((it, ii) => {\n        const m = toMonthly(it.amount, it.freq);\n        subtotalM += m;\n        return {\n          name: it.name, amount: it.amount, freq: it.freq,\n          convertedStr: vfmt(m) + suffix,\n          onAmount: (e) => this.updateAmount(si, ii, e.target.value === '' ? 0 : Number(e.target.value)),\n          onFreq: (e) => this.updateFreq(si, ii, e.target.value),\n        };\n      });\n      if (sec.kind === 'income') incomeM += subtotalM; else expenseM += subtotalM;\n      if (sec.id === 'groceries') groceryM = subtotalM;\n      return {\n        name: sec.name, color: sec.color, kind: sec.kind, id: sec.id,\n        subtotalStr: (sec.kind === 'income' ? '' : '−') + vfmt(subtotalM) + suffix,\n        totalColor: sec.kind === 'income' ? '#2f8a4e' : '#c43d31',\n        _m: subtotalM, items,\n      };\n    });\n\n    const surplusM = incomeM - expenseM;\n    const fixedM = expenseM - groceryM;\n    const saveM = Math.max(surplusM, 0);\n    const pct = (m) => incomeM > 0 ? (m / incomeM) * 100 : 0;\n\n    // Donut: expense sections (>0) + surplus\n    const donutCats = sectionsVM.filter((v) => v.kind === 'expense' && v._m > 0).map((v) => ({ name: v.name, value: v._m, color: v.color }));\n    if (surplusM > 0) donutCats.push({ name: 'Surplus / unallocated', value: surplusM, color: '#aeb2a6' });\n    const circ = 2 * Math.PI * 92;\n    const totalForDonut = donutCats.reduce((a, c) => a + c.value, 0) || 1;\n    let acc = 0;\n    const donutSegments = donutCats.map((c) => {\n      const len = (c.value / totalForDonut) * circ;\n      const seg = {\n        name: c.name, color: c.color,\n        valueStr: vfmt(c.value) + suffix,\n        pct: Math.round(pct(c.value)) + '%',\n        dash: `${len.toFixed(2)} ${circ.toFixed(2)}`,\n        offset: Number((-acc).toFixed(2)),\n      };\n      acc += len;\n      return seg;\n    });\n\n    // Plan vs target rows\n    const mkRow = (label, color, actualM, targetPct, lowerBetter) => {\n      const p = pct(actualM);\n      const ok = lowerBetter ? p <= targetPct : p >= targetPct;\n      return {\n        label, color,\n        pctStr: Math.round(p) + '%',\n        targetStr: targetPct + '%',\n        actualStr: vfmt(actualM) + suffix,\n        barWidth: Math.max(0, Math.min(100, p)) + '%',\n        markerLeft: targetPct + '%',\n        barColor: ok ? color : '#c43d31',\n      };\n    };\n    const targetRows = [\n      mkRow('Fixed costs', '#d6493a', fixedM, 50, true),\n      mkRow('Aggressive savings', '#2f8a4e', saveM, 30, false),\n      mkRow('Groceries', '#ef9f1f', groceryM, 20, true),\n    ];\n\n    const saveRate = Math.round(pct(saveM));\n    const fixedPct = Math.round(pct(fixedM));\n    let insight = `On ${fmt(incomeM)} of monthly income you're spending ${fmt(expenseM)} across every category, `;\n    insight += surplusM >= 0\n      ? `leaving a ${fmt(surplusM)} surplus — a ${saveRate}% savings rate against the 30% aggressive goal. `\n      : `which leaves you ${fmt(-surplusM)} in the red each month. `;\n    insight += fixedPct > 50\n      ? `Fixed costs are ${fixedPct}% of income, over the 50% guide.`\n      : `Fixed costs sit at ${fixedPct}% of income, inside the 50% guide.`;\n\n    const views = ['Weekly', 'Fortnightly', 'Monthly', 'Quarterly', 'Annually'];\n    const viewButtons = views.map((v) => ({\n      label: v,\n      onClick: () => this.setView(v),\n      bg: v === s.view ? '#ffffff' : 'transparent',\n      color: v === s.view ? '#2a2823' : '#8d887c',\n      shadow: v === s.view ? '0 1px 3px rgba(0,0,0,.12)' : 'none',\n    }));\n\n    return {\n      insight, sections: sectionsVM, donutSegments, targetRows, viewButtons,\n      periodLabel: LABELS[s.view],\n      incomeStr: vfmt(incomeM) + suffix,\n      expenseStr: vfmt(expenseM) + suffix,\n      expensePctStr: Math.round(pct(expenseM)) + '%',\n      surplusLabel: surplusM >= 0 ? 'Surplus' : 'Shortfall',\n      surplusStr: (surplusM < 0 ? '−' : '') + vfmt(Math.abs(surplusM)) + suffix,\n      surplusColor: surplusM >= 0 ? '#2c7cc4' : '#c43d31',\n      saveRateStr: saveRate + '%',\n      saveColor: saveRate >= 30 ? '#2f8a4e' : '#d68a1f',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
